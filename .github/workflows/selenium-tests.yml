name: Selenium Tests with Video Recording

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      browser:
        description: 'Browser to use'
        required: false
        default: 'chrome'
        type: choice
        options:
          - chrome
          - firefox

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Install Selenoid & Selenoid UI
        run: |
          curl -s https://aerokube.com/cm/bash | bash
          chmod +x cm
          docker pull selenoid/vnc_chrome:128.0
          docker pull selenoid/video-recorder:latest-release
          ./cm selenoid start \
            --vnc \
            --last-versions 1 \
            --browsers chrome \
            --args "-video-output-dir /opt/selenoid/video"

      - name: Wait for Selenoid to be ready
        run: |
          echo "Waiting for Selenoid..."
          for i in {1..30}; do
            if curl -s http://localhost:4444/status | grep -q "total"; then
              echo "Selenoid is ready!"
              break
            fi
            sleep 2
          done

      - name: Run Selenium Tests
        env:
          SELENOID_URL: http://localhost:4444/wd/hub
          USE_REMOTE: "true"
        run: |
          mvn clean test \
            -Dselenoid.url=$SELENOID_URL \
            -Duse.remote=true \
            -Dsurefire.failIfNoSpecifiedTests=false \
            -B

      - name: Copy videos from Selenoid container
        if: always()
        run: |
          mkdir -p test-videos

          # Selenoid are nevoie de cateva secunde dupa driver.quit() sa finalizeze MP4
          echo "Waiting 15s for Selenoid to finalize video encoding..."
          sleep 15

          SELENOID_ID=$(docker ps -q --filter "name=selenoid")
          echo "Selenoid container ID: $SELENOID_ID"

          if [ -n "$SELENOID_ID" ]; then
            for i in {1..20}; do
              docker cp $SELENOID_ID:/opt/selenoid/video/. test-videos/ 2>/dev/null || true
              VIDEO_SIZE=$(find test-videos -name "*.mp4" -size +1k | wc -l)
              if [ "$VIDEO_SIZE" -gt 0 ]; then
                echo "Video ready!"
                break
              fi
              echo "Attempt $i: video not ready yet, waiting 3s..."
              sleep 3
            done
          else
            echo "Selenoid container not found"
          fi

          ls -lah test-videos/
          echo "Total valid videos: $(find test-videos -name '*.mp4' -size +1k | wc -l)"

      - name: Generate Surefire Report
        if: always()
        run: mvn surefire-report:report-only -B || true

      - name: Upload Test Videos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-videos-${{ github.run_number }}
          path: test-videos/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: |
            target/surefire-reports/
            target/site/surefire-report.html
          retention-days: 30
          if-no-files-found: warn

      - name: Upload Logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
          if-no-files-found: warn

      - name: Test Summary
        if: always()
        run: |
          echo "## Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/TestSuite.xml ]; then
            TESTS=$(grep -o 'tests="[0-9]*"' target/surefire-reports/TestSuite.xml | head -1 | grep -o '[0-9]*')
            FAILURES=$(grep -o 'failures="[0-9]*"' target/surefire-reports/TestSuite.xml | head -1 | grep -o '[0-9]*')
            ERRORS=$(grep -o 'errors="[0-9]*"' target/surefire-reports/TestSuite.xml | head -1 | grep -o '[0-9]*')
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total Tests | $TESTS |" >> $GITHUB_STEP_SUMMARY
            echo "| Failures | $FAILURES |" >> $GITHUB_STEP_SUMMARY
            echo "| Errors | $ERRORS |" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Video recordings are available in the Artifacts section above." >> $GITHUB_STEP_SUMMARY